<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>earth_to_dxf Web Prototype</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="toolbar-group">
          <span class="toolbar-label">地図</span>
          <div class="address-search">
            <input id="addressInput" type="text" placeholder="住所を入力" value="{{ initial_state.address }}">
            <button id="searchButton" class="tool-button primary">住所検索</button>
          </div>
          <button id="fetchButton" class="tool-button">再取得</button>
          <button class="tool-button map-type-button" data-tile-type="seamlessphoto">写真</button>
          <button class="tool-button map-type-button" data-tile-type="pale">淡色</button>
          <button class="tool-button map-type-button" data-tile-type="std">標準</button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">作図</span>
          <button class="tool-button layer-button" data-layer="ROAD">道路</button>
          <button class="tool-button layer-button" data-layer="SITE">敷地</button>
          <button class="tool-button layer-button" data-layer="SLOPE">法面</button>
          <button class="tool-button layer-button" data-layer="STRUCTURE">構造物</button>
          <button id="finishLineButton" class="tool-button">線確定</button>
          <button id="finishPolygonButton" class="tool-button">閉面確定</button>
          <button id="undoButton" class="tool-button">戻る</button>
          <button id="saveDxfButton" class="tool-button">DXF保存</button>
          <button id="clearPointsButton" class="tool-button">クリア</button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">保存</span>
          <button id="saveProjectButton" class="tool-button">作業保存</button>
          <button id="loadProjectButton" class="tool-button">作業読込</button>
        </div>
      </header>

      <main class="workspace-shell">
        <div class="workspace">
          <section class="map-panel">
            <div class="map-stage" id="mapStage">
              <div class="map-canvas">
                <img id="mapImage" src="{{ initial_state.image_url }}" alt="背景地図">
                <svg id="drawOverlay" class="draw-overlay"></svg>
              </div>
              <div class="map-control-panel" aria-label="地図操作">
                <div class="mode-card compact">
                  <span class="mode-label">MODE</span>
                  <div class="mode-switches" role="group" aria-label="操作モード">
                    <button id="modeDrawButton" class="mode-switch-button" data-mode="DRAW">作図</button>
                    <button id="modePanButton" class="mode-switch-button" data-mode="PAN">移動</button>
                    <button id="modeCenterButton" class="mode-switch-button" data-mode="CENTER_SELECT">中心</button>
                  </div>
                </div>
                <div class="map-control-stack">
                  <div class="zoom-pad compact-row">
                    <button class="map-control-button map-action-button" data-map-action="zoom_in">+</button>
                    <button class="map-control-button map-action-button" data-map-action="zoom_out">-</button>
                  </div>
                  <div class="pan-pad">
                    <span></span>
                    <button class="map-control-button map-action-button" data-map-action="pan_up">↑</button>
                    <span></span>
                    <button class="map-control-button map-action-button" data-map-action="pan_left">←</button>
                    <span class="pan-pad-center"></span>
                    <button class="map-control-button map-action-button" data-map-action="pan_right">→</button>
                    <span></span>
                    <button class="map-control-button map-action-button" data-map-action="pan_down">↓</button>
                    <span></span>
                  </div>
                </div>
              </div>
              <div id="scaleBar" class="scale-bar" aria-label="スケールバー">
                <div id="scaleBarLine" class="scale-bar-line"></div>
                <div id="scaleBarLabel" class="scale-bar-label">-</div>
              </div>
            </div>
          </section>

          <aside class="info-panel">
            <div class="panel-block">
              <h2>情報</h2>
              <dl class="info-list compact">
                <div><dt>現在住所</dt><dd id="infoAddress">-</dd></div>
                <div><dt>緯度 / 経度</dt><dd><span id="infoLatitude">-</span> / <span id="infoLongitude">-</span></dd></div>
                <div><dt>地図 / Zoom</dt><dd><span id="infoTileType">-</span> / <span id="infoZoom">-</span></dd></div>
                <div><dt>現在レイヤ</dt><dd id="infoCurrentLayer">道路</dd></div>
                <div><dt>概算縮尺</dt><dd id="infoApproxScale">-</dd></div>
                <div><dt>保存先</dt><dd id="infoOutputDir">-</dd></div>
                <div><dt>作図中点数</dt><dd id="infoCurrentPointCount">0</dd></div>
                <div><dt>作図中延長</dt><dd id="infoCurrentLength">0.00 m</dd></div>
                <div><dt>確定図形数</dt><dd id="infoEntityCount">0</dd></div>
                <div><dt>確定線総延長</dt><dd id="infoTotalLength">0.00 m</dd></div>
                <div><dt>総面積</dt><dd id="infoTotalArea">0.00 ㎡</dd></div>
              </dl>
            </div>

            <div class="panel-block">
              <h2>作図中</h2>
              <p class="draw-help">地図上クリックで点追加</p>
            </div>
          </aside>
        </div>

        <section class="layer-summary-bar">
          <div id="layerSummaryList" class="layer-summary-list horizontal">
            <div class="layer-summary-item">
              <div class="layer-summary-head">
                <span>道路</span>
              </div>
              <div class="layer-summary-values">
                <span>延長: 0.00 m</span>
                <span>面積: 0.00 ㎡</span>
              </div>
            </div>
            <div class="layer-summary-item">
              <div class="layer-summary-head">
                <span>敷地</span>
              </div>
              <div class="layer-summary-values">
                <span>延長: 0.00 m</span>
                <span>面積: 0.00 ㎡</span>
              </div>
            </div>
            <div class="layer-summary-item">
              <div class="layer-summary-head">
                <span>法面</span>
              </div>
              <div class="layer-summary-values">
                <span>延長: 0.00 m</span>
                <span>面積: 0.00 ㎡</span>
              </div>
            </div>
            <div class="layer-summary-item">
              <div class="layer-summary-head">
                <span>構造物</span>
              </div>
              <div class="layer-summary-values">
                <span>延長: 0.00 m</span>
                <span>面積: 0.00 ㎡</span>
              </div>
            </div>
          </div>
        </section>
      </main>

      <footer class="statusbar">
        <span id="statusMessage">HTML UI プロトタイプを起動しました</span>
      </footer>
    </div>

    <script>
      window.__INITIAL_STATE__ = {{ initial_state|tojson }};
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
  </html>
