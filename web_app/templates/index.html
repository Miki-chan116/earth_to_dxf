<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>earth_to_dxf Web Prototype</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="toolbar-group">
          <span class="toolbar-label">地図</span>
          <div class="address-search">
            <input id="addressInput" type="text" placeholder="住所を入力" value="{{ initial_state.address }}">
            <button id="searchButton" class="tool-button primary">住所検索</button>
          </div>
          <button id="centerSelectButton" class="tool-button">中心指定</button>
          <button id="fetchButton" class="tool-button">再取得</button>
          <button class="tool-button map-type-button" data-tile-type="seamlessphoto">写真</button>
          <button class="tool-button map-type-button" data-tile-type="pale">淡色</button>
          <button class="tool-button map-type-button" data-tile-type="std">標準</button>
        </div>
        <div class="toolbar-group">
          <span class="toolbar-label">作図</span>
          <button id="clearPointsButton" class="tool-button">クリア</button>
        </div>
      </header>

      <main class="workspace">
        <section class="map-panel">
          <div class="map-stage" id="mapStage">
            <img id="mapImage" src="{{ initial_state.image_url }}" alt="背景地図">
            <svg id="drawOverlay" class="draw-overlay"></svg>
          </div>
        </section>

        <aside class="info-panel">
          <div class="panel-block">
            <h2>情報</h2>
            <dl class="info-list">
              <div><dt>MODE</dt><dd id="infoMode">DRAW</dd></div>
              <div><dt>現在住所</dt><dd id="infoAddress">-</dd></div>
              <div><dt>検索結果</dt><dd id="infoDisplayName">-</dd></div>
              <div><dt>緯度</dt><dd id="infoLatitude">-</dd></div>
              <div><dt>経度</dt><dd id="infoLongitude">-</dd></div>
              <div><dt>地図種別</dt><dd id="infoTileType">-</dd></div>
              <div><dt>ズーム</dt><dd id="infoZoom">-</dd></div>
              <div><dt>保存先</dt><dd id="infoOutputDir">-</dd></div>
              <div><dt>点数</dt><dd id="infoPointCount">0</dd></div>
            </dl>
          </div>

          <div class="panel-block">
            <h2>作図中</h2>
            <p class="draw-help">地図上をクリックすると点を追加します。点は線でつながります。</p>
          </div>
        </aside>
      </main>

      <footer class="statusbar">
        <span id="statusMessage">HTML UI プロトタイプを起動しました</span>
      </footer>
    </div>

    <script>
      window.__INITIAL_STATE__ = {{ initial_state|tojson }};
    </script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
  </html>
